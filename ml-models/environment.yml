# Conda environment for the ml-models project
# Note: RAPIDS (cudf) and cupy require matching CUDA and Python builds.
# If the solver fails or prebuilt packages for Python 3.12 + CUDA 13 are unavailable,
# create the env without cudf/cupy and then install them with mamba:
#   mamba install -y -c rapidsai -c nvidia -c conda-forge cudf cudatoolkit=13.0 cupy

name: ml-models
channels:
  - rapidsai
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - mamba
  - geopandas>=1.1.3
  - xgboost
  - shap
  - cudatoolkit=13.0
  - cudf
  - cupy
  - pip

# Optional: after creating the env, prefer using mamba for any further RAPIDS installs
# Example (recommended if cudf/cupy weren't resolved above):
#   mamba install -y -c rapidsai -c nvidia -c conda-forge cudf cudatoolkit=13.0 cupy
